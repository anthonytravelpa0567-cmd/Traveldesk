<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelDesk CRM</title>
<style>
  :root{
    --navy-950:#0d1b2e;
    --navy-900:#132a45;
    --navy-800:#1b3a5c;
    --blue-700:#2c6ca8;
    --blue-500:#3d84c4;
    --teal-600:#0e8f8f;
    --teal-500:#0ea5a5;
    --amber-500:#c98a1f;
    --red-600:#b3423a;
    --green-600:#2f8f5b;
    --bg:#eef1f5;
    --panel:#ffffff;
    --panel-alt:#f6f8fa;
    --border:#d7dde4;
    --text-900:#1f2933;
    --text-600:#52606d;
    --text-400:#8a97a3;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-ui);
    background:var(--bg);
    color:var(--text-900);
    font-size:14px;
    line-height:1.45;
  }
  #app{display:flex;flex-direction:column;height:100vh;}

  /* ===== Top Nav ===== */
  .topnav{
    background:linear-gradient(180deg,var(--navy-900),var(--navy-950));
    display:flex;align-items:center;
    padding:0 8px;
    height:44px;
    flex-shrink:0;
  }
  .brand{
    color:#fff;font-weight:700;letter-spacing:.3px;
    padding:0 16px 0 8px;font-size:15px;
    display:flex;align-items:center;gap:8px;
  }
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-500);box-shadow:0 0 0 3px rgba(14,165,165,.25);}
  .navitems{display:flex;height:100%;}
  .navitem{
    color:#cdd7e1;background:transparent;border:none;
    padding:0 18px;height:100%;font-size:13.5px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:6px;
    border-bottom:3px solid transparent;
    transition:background .15s, color .15s;
    white-space:nowrap;
  }
  .navitem:hover{background:rgba(255,255,255,.06);color:#fff;}
  .navitem.active{color:#fff;background:rgba(255,255,255,.08);border-bottom:3px solid var(--teal-500);}
  .navitem .care{font-size:9px;opacity:.7;}
  .nav-spacer{flex:1;}
  .nav-right{display:flex;align-items:center;gap:14px;padding-right:12px;}
  .user-chip{
    display:flex;align-items:center;gap:8px;color:#cdd7e1;font-size:12.5px;font-weight:600;
  }
  .user-chip .avatar{
    width:24px;height:24px;border-radius:50%;background:var(--teal-600);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  }

  /* ===== Status strip ===== */
  .statusbar{
    background:#3d4a58;color:#e4e9ee;
    font-size:12.5px;padding:6px 16px;
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
  }
  .statusbar a{color:#8fd3d3;text-decoration:underline;cursor:pointer;font-weight:600;}
  .statusbar.has-active{background:var(--teal-600);}
  .statusbar .ref-pill{
    background:rgba(255,255,255,.15);padding:2px 9px;border-radius:20px;font-weight:700;font-family:var(--font-mono);font-size:11.5px;
  }

  /* ===== Main/Pages tab strip ===== */
  .subtabbar{
    background:var(--blue-700);
    display:flex;
    flex-shrink:0;
  }
  .subtab{
    color:#dceafd;background:transparent;border:none;
    padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .subtab.active{background:var(--panel-alt);color:var(--navy-900);border-radius:0;}

  /* ===== Layout body ===== */
  .body-wrap{flex:1;overflow:auto;background:var(--panel-alt);}
  .content{max-width:1180px;margin:0 auto;padding:22px 26px 60px;}

  h1.page-title{font-size:20px;margin:0 0 4px;color:var(--navy-900);}
  .page-sub{color:var(--text-600);font-size:13px;margin:0 0 18px;}

  /* Cards / panels */
  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    margin-bottom:16px;overflow:hidden;
  }
  .card-head{
    padding:12px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-alt);
  }
  .card-head h3{margin:0;font-size:13.5px;color:var(--navy-900);text-transform:uppercase;letter-spacing:.4px;}
  .card-body{padding:16px;}

  /* Dashboard stat grid */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .stat{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;
    border-left:4px solid var(--teal-500);
  }
  .stat .num{font-size:24px;font-weight:800;color:var(--navy-900);font-family:var(--font-mono);}
  .stat .lbl{font-size:12px;color:var(--text-600);margin-top:2px;font-weight:600;}
  .stat.amber{border-left-color:var(--amber-500);}
  .stat.red{border-left-color:var(--red-600);}
  .stat.blue{border-left-color:var(--blue-500);}

  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--text-600);padding:9px 12px;border-bottom:2px solid var(--border);background:var(--panel-alt);
  }
  td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-900);}
  tr.row-link{cursor:pointer;transition:background .12s;}
  tr.row-link:hover{background:#eef6fb;}
  .badge{
    display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;
  }
  .badge.confirmed{background:#e2f4ea;color:var(--green-600);}
  .badge.quote{background:#fdf1de;color:var(--amber-500);}
  .badge.cancelled{background:#fbe7e5;color:var(--red-600);}
  .badge.pending{background:#e6eefb;color:var(--blue-700);}
  .badge.changed{background:#fdeee0;color:#b5651d;}
  .ref-link{color:var(--blue-700);font-weight:700;text-decoration:none;font-family:var(--font-mono);}

  /* ===== Overview tab (portfolio) ===== */
  .ov-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .ov-toolbar .btn{padding:7px 13px;font-size:12.5px;}
  .kv-grid{display:grid;grid-template-columns:170px 1fr 170px 1fr;row-gap:11px;column-gap:10px;font-size:13px;}
  .kv-grid .k{color:var(--text-600);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;}
  .kv-grid .v{color:var(--navy-900);font-weight:600;}
  .kv-grid .v a{color:var(--blue-700);font-weight:700;}
  .kv-grid .v.money{font-family:var(--font-mono);}
  .kv-grid .v.due{color:var(--red-600);}
  .ov-section-title{font-size:13px;font-weight:800;color:var(--navy-900);text-transform:uppercase;letter-spacing:.4px;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
  .pax-table th, .pax-table td{font-size:12.5px;}
  .lead-yes{color:var(--green-600);font-weight:700;}
  .lead-no{color:var(--text-400);}
  .element-card{border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden;}
  .element-head{
    display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--panel-alt);
    border-bottom:1px solid var(--border);flex-wrap:wrap;
  }
  .element-head .etype{font-weight:800;color:var(--navy-900);font-size:13.5px;}
  .element-head .esup{color:var(--text-600);font-size:12.5px;}
  .element-head .espacer{flex:1;}
  .element-head .efig{text-align:right;font-size:12px;color:var(--text-600);}
  .element-head .efig b{display:block;font-family:var(--font-mono);color:var(--navy-900);font-size:14px;}
  .element-head .elink{color:var(--blue-700);font-weight:700;font-size:12px;cursor:pointer;}
  .element-body{padding:16px;}
  .element-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-600);margin:16px 0 8px;}
  .element-body h4:first-child{margin-top:0;}
  .flight-row, .room-row{
    background:var(--panel-alt);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12.5px;
  }
  .flight-row .fnum{font-family:var(--font-mono);font-weight:700;color:var(--navy-900);margin-bottom:4px;}
  .element-elist{display:flex;flex-wrap:wrap;gap:6px 22px;color:var(--text-600);}
  .element-elist b{color:var(--text-900);}
  .doc-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
  .doc-pill.no{background:#fbe7e5;color:var(--red-600);}
  .doc-pill.yes{background:#e2f4ea;color:var(--green-600);}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .btn{
    border:none;border-radius:6px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--teal-600);color:#fff;}
  .btn-primary:hover{background:var(--teal-500);}
  .btn-ghost{background:#fff;color:var(--navy-900);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--panel-alt);}
  .search-input{
    border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;flex:1;max-width:320px;
    background:#fff;
  }
  select.search-input{max-width:180px;}

  /* Portfolio header */
  .pf-header{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:16px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;
  }
  .pf-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .pf-title h2{margin:0;font-size:18px;color:var(--navy-900);}
  .pf-meta{display:flex;gap:22px;margin-top:8px;flex-wrap:wrap;}
  .pf-meta div{font-size:12px;color:var(--text-600);}
  .pf-meta div b{display:block;color:var(--navy-900);font-size:13.5px;font-family:var(--font-mono);margin-top:1px;}

  .breadcrumb{font-size:12px;color:var(--text-600);margin-bottom:10px;}
  .breadcrumb a{color:var(--blue-700);cursor:pointer;text-decoration:none;font-weight:600;}
  .breadcrumb a:hover{text-decoration:underline;}

  /* Portfolio tab bar */
  .pf-tabbar{
    display:flex;background:#fff;border:1px solid var(--border);border-radius:8px 8px 0 0;
    border-bottom:none;overflow-x:auto;
  }
  .pf-tab{
    padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text-600);
    border-bottom:3px solid transparent;white-space:nowrap;
  }
  .pf-tab:hover{color:var(--navy-900);background:var(--panel-alt);}
  .pf-tab.active{color:var(--teal-600);border-bottom:3px solid var(--teal-600);}
  .pf-panel{
    background:#fff;border:1px solid var(--border);border-radius:0 0 8px 8px;padding:20px;
  }

  /* Form grid */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;}
  .form-grid.full{grid-template-columns:1fr;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--text-600);text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:var(--font-ui);background:#fbfcfd;
  }
  .field textarea{resize:vertical;min-height:70px;}

  /* Notes */
  .note-item{border-left:3px solid var(--teal-500);background:var(--panel-alt);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:10px;}
  .note-item .meta{font-size:11px;color:var(--text-400);margin-bottom:4px;font-weight:600;}

  /* Payments summary */
  .pay-summary{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .pay-box{flex:1;min-width:140px;background:var(--panel-alt);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .pay-box .v{font-size:19px;font-weight:800;font-family:var(--font-mono);color:var(--navy-900);}
  .pay-box .l{font-size:11px;color:var(--text-600);font-weight:700;text-transform:uppercase;margin-top:2px;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-400);}
  .empty-state .icon{font-size:34px;margin-bottom:10px;}

  .more-dropdown{position:relative;display:inline-block;}
  .more-menu{
    position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);
    border-radius:8px;box-shadow:0 8px 24px rgba(20,30,45,.16);min-width:180px;z-index:50;overflow:hidden;
    display:none;
  }
  .more-menu.open{display:block;}
  .more-menu button{
    width:100%;text-align:left;background:none;border:none;padding:10px 14px;font-size:13px;
    cursor:pointer;color:var(--text-900);border-bottom:1px solid var(--border);
  }
  .more-menu button:last-child{border-bottom:none;}
  .more-menu button:hover{background:var(--panel-alt);}

  .toast{
    position:fixed;bottom:22px;right:22px;background:var(--navy-900);color:#fff;
    padding:12px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);
    display:flex;align-items:center;gap:8px;z-index:200;opacity:0;transform:translateY(10px);
    transition:opacity .25s, transform .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .toast .dot{width:7px;height:7px;border-radius:50%;background:var(--teal-500);}

  ::-webkit-scrollbar{height:9px;width:9px;}
  ::-webkit-scrollbar-thumb{background:#c3ccd4;border-radius:6px;}

  /* ===== Login screen ===== */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 20% 20%, #1b3a5c 0%, #0d1b2e 55%, #091422 100%);
    font-family:var(--font-ui);
  }
  .login-card{
    width:380px;background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .login-brand{
    background:linear-gradient(135deg,var(--navy-900),var(--navy-950));
    padding:26px 30px 22px;color:#fff;text-align:center;
  }
  .login-brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal-500);display:inline-block;margin-right:8px;box-shadow:0 0 0 4px rgba(14,165,165,.25);}
  .login-brand h1{margin:10px 0 2px;font-size:22px;letter-spacing:.3px;}
  .login-brand p{margin:0;font-size:12px;color:#9fb3c8;}
  .login-roles{display:flex;border-bottom:1px solid var(--border);}
  .login-role-btn{
    flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;
    color:var(--text-600);background:var(--panel-alt);border:none;border-bottom:3px solid transparent;
  }
  .login-role-btn.active{color:var(--navy-900);background:#fff;border-bottom:3px solid var(--teal-500);}
  .login-body{padding:26px 30px 30px;}
  .login-body .field{margin-bottom:16px;}
  .login-error{
    background:#fbe7e5;color:var(--red-600);font-size:12.5px;font-weight:600;
    padding:9px 12px;border-radius:6px;margin-bottom:14px;display:none;
  }
  .login-error.show{display:block;}
  .login-body .btn{width:100%;justify-content:center;padding:11px;font-size:13.5px;}
  .login-hint{font-size:11.5px;color:var(--text-400);margin-top:16px;text-align:center;line-height:1.6;}
  .logout-link{color:#cdd7e1;font-size:12px;cursor:pointer;font-weight:600;}
  .logout-link:hover{color:#fff;text-decoration:underline;}
</style>
</head>

function toast(msg){
  const t = document.getElementById('toast');
  t.querySelector('span').textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

        <div class="login-hint">

          ${state.loginRole==='admin' ? '<b>Anthony</b> / <b>12345678</b>' : '<b>agent</b> / <b>agent123</b>'}
        </div>
      </div>
    </div>
  </div>`;
}

function attachLoginEvents(){
  document.querySelectorAll('[data-loginrole]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.loginRole = el.getAttribute('data-loginrole');
      state.loginError = "";
      render();
    });
  });
  const doLogin = ()=>{
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const list = USERS[state.loginRole];
    const match = list.find(x=>x.username===u && x.password===p);
    if(match){
      state.loggedIn = true;
      state.role = state.loginRole;
      state.currentUser = match;
      state.loginError = "";
      render();
    } else {
      state.loginError = "Incorrect username or password. Please try again.";
      render();
    }
  };
  const btn = document.querySelector('[data-action="do-login"]');
  if(btn) btn.addEventListener('click', doLogin);
  ['login-user','login-pass'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  });
}

/* Builds the full Overview data set for a booking. Uses b.overview if the
   booking has one (fully authored, e.g. the Dosanjh reference booking),
   otherwise synthesises equivalent fields from the booking's existing data
   so every booking renders the same rich layout. */
function ovData(b){
  if(b.overview) return b.overview;
  const totalCost = b.costings.reduce((s,c)=>s+c.cost,0);
  const totalSell = b.costings.reduce((s,c)=>s+c.sell,0);
  const created = b.notes[0] ? b.notes[0].date : '-';
  const statusLabels = {confirmed:"Confirmed", pending:"Pending", quote:"Quote", cancelled:"Cancelled", changed:"Changed"};
  return {
    portfolioRef:b.id, createdOn:created, bookedOn:created,
    hmRef:'-', bookingWebsite:'-', externalRef:'-', importantInfo:'',
    bookingStatusLabel:statusLabels[b.status]||b.status,
    dueDate:b.payments.dueDate, balanceDue:b.payments.due, salesConsultant:b.agent,
    financials:{
      holidayPrice:totalSell, supplements:0.00, handlingFees:0.00, totalCost:totalSell,
      totalPaid:b.payments.paid, outstanding:b.payments.due, unassignedCredits:0.00, assignedCredits:0.00, hwCommissionDue:0.00,
      totalDue:totalCost, dueToSuppliers:totalCost, paidToSupplier:0.00, vat:0.00,
      currencyLossGain:0.00, refund:0.00, profit:totalSell-totalCost, hwCommissionPaid:0.00
    },
    passengerDetails:b.passengers.map((p,i)=>({
      name:p.name, dob:p.dob, age:'', type:p.type, lead:i===0,
      telephone:i===0?b.contact.phone:'', mobile:b.contact.phone, email:i===0?b.contact.email:''
    })),
    elements:b.costings.map(c=>({
      etype:"Item", status:b.status, supplier:c.supplier, bookingRef:'-',
      pax:b.passengers.length, nett:c.cost, gross:c.sell,
      operatorRef:'-', from:b.depart, hotelName:c.item, nights:'-', description:'',
      transfersIncluded:false, grossPrice:c.sell,
      flights:[], rooms:[], passengers:b.passengers.map(p=>p.name), documentsReceived:false
    }))
  };
}

function kv(label, value, cls){
  return `<div class="k">${label}</div><div class="v ${cls||''}">${(value===undefined||value===null||value==='')?'-':value}</div>`;

/* Builds the full contact detail set for a booking. Uses b.contact.detail if
   authored (e.g. the Dosanjh reference booking), otherwise makes a best-effort
   split of the existing name/address/phone fields so every booking's Contact
   tab renders the same full form. */
function contactDetail(b){
  const c = b.contact;
  if(c.detail) return c.detail;
  const titleMatch = c.name.match(/^(Mr|Mrs|Miss|Ms|Dr)\.?\s+/i);
  const title = titleMatch ? titleMatch[1] : '';
  const rest = (titleMatch ? c.name.slice(titleMatch[0].length) : c.name).trim();
  const nameParts = rest.split(/\s+/).filter(Boolean);
  const firstName = nameParts[0]||'';
  const lastName = nameParts.length>1 ? nameParts[nameParts.length-1] : '';
  const middleName = nameParts.length>2 ? nameParts.slice(1,-1).join(' ') : '';
  const addrParts = (c.address||'').split(',').map(s=>s.trim()).filter(s=>s && s!=='-');
  let postcode='', town='';
  if(addrParts.length){
    const last = addrParts[addrParts.length-1];
    if(/\d/.test(last) && last.length<=9){ postcode = last; addrParts.pop(); }
    town = addrParts.length ? addrParts.pop() : '';
  }
  return {
    title, firstName, middleName, lastName,
    dobDay:'', dobMonth:'', dobYear:'',
    telephone:(c.phone&&c.phone!=='-')?c.phone:'', mobile:'', workPhone:'', altPhone:'', fax:'',
    email:(c.email&&c.email!=='-')?c.email:'', altEmail:'',
    postcode, addressLine1:addrParts.join(', '), addressLine2:'', town, county:'', country:'United Kingdom'
  };
}

    <div class="pay-box"><div class="v" style="font-size:14px;">${b.payments.dueDate}</div><div class="l">Due Date</div></div>
  </div>
  <div class="toolbar"><button class="btn btn-primary" data-action="toggle-receipt-form">+ Record Receipt</button><button class="btn btn-ghost" data-action="send-reminder">Send Payment Reminder</button></div>
  ${state.showReceiptForm ? `
  <div class="card" style="margin-bottom:16px;"><div class="card-body">
    <div class="form-grid">
      <div class="field"><label>Date</label><input id="rc-date" type="text" value="07 Jul 2026"></div>
      <div class="field"><label>Reference</label><input id="rc-ref" value="RCP-${9200+b.receipts.length}"></div>
      <div class="field"><label>Method</label>
        <select id="rc-method"><option>Card</option><option>Bank Transfer</option><option>Cash</option><option>Cheque</option></select>
      </div>
      <div class="field"><label>Amount (\u00a3)</label><input id="rc-amount" type="number" placeholder="e.g. 500"></div>
      <div class="field" style="grid-column:1/-1;"><label>Note</label><input id="rc-note" placeholder="e.g. Deposit, Balance, Interim payment"></div>
    </div>
    <div class="toolbar" style="margin-top:14px;">
      <button class="btn btn-primary" data-action="save-receipt">Save Receipt</button>
      <button class="btn btn-ghost" data-action="toggle-receipt-form">Cancel</button>
    </div>
  </div></div>` : ''}
  ${b.receipts.length ? `<table>
    <thead><tr><th>Date</th><th>Reference</th><th>Method</th><th>Note</th><th>Amount</th></tr></thead>
    <tbody>${b.receipts.map(r=>`<tr><td>${r.date}</td><td class="ref-link">${r.ref}</td><td>${r.method}</td><td>${r.note}</td><td>${fmt(r.amount)}</td></tr>`).join('')}</tbody>
    <tfoot><tr style="font-weight:700;background:var(--panel-alt);"><td colspan="4">Total Received</td><td>${fmt(b.receipts.reduce((s,r)=>s+r.amount,0))}</td></tr></tfoot>
  </table>` : `<div class="empty-state"><div class="icon">\u{1F9FE}</div>No receipts recorded yet.</div>`}`;
}

function pfDocumentation(b){
  return `
  <div class="toolbar"><button class="btn btn-primary" data-action="upload-doc">+ Upload Document</button></div>
  ${b.documentation.length ? `<table>
    <thead><tr><th>Document</th><th>Type</th><th>Date Added</th><th></th></tr></thead>
    <tbody>${b.documentation.map(d=>`<tr><td>\u{1F4C4} ${d.name}</td><td>${d.type}</td><td>${d.date}</td><td><span style="color:var(--blue-700);cursor:pointer;font-weight:700;font-size:12px;">Download</span></td></tr>`).join('')}</tbody>
  </table>` : `<div class="empty-state"><div class="icon">\u{1F4C1}</div>No documents uploaded yet.</div>`}`;
}

function pfNotes(b){
  return `
  <div class="toolbar" style="align-items:flex-start;">
    <textarea id="new-note" class="field" placeholder="Add a note about this booking..." style="flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;min-height:44px;font-family:var(--font-ui);"></textarea>
    <button class="btn btn-primary" data-action="add-note">Add Note</button>
  </div>
  ${b.notes.slice().reverse().map(n=>`<div class="note-item"><div class="meta">${n.author} \u2014 ${n.date}</div>${n.text}</div>`).join('') || `<div class="empty-state"><div class="icon">\u{1F4DD}</div>No notes yet.</div>`}`;
}

function pfPayments(b){
  const sp = b.supplierPayments || [];
  const totalCost = b.costings.reduce((s,c)=>s+c.cost,0);
  const paidToSupplier = sp.reduce((s,p)=>s+p.amount,0);
  const balanceToSuppliers = totalCost - paidToSupplier;
  const suppliers = [...new Set(b.costings.map(c=>c.supplier))];
  return `
  <p style="margin:0 0 14px;color:var(--text-600);font-size:12.5px;">Supplier payments &mdash; money paid <b>out</b> from your agency to the suppliers on this booking.</p>
  <div class="pay-summary">
    <div class="pay-box"><div class="v">${fmt(totalCost)}</div><div class="l">Total Due to Suppliers</div></div>
    <div class="pay-box"><div class="v" style="color:var(--green-600);">${fmt(paidToSupplier)}</div><div class="l">Paid to Supplier</div></div>
    <div class="pay-box"><div class="v" style="color:${balanceToSuppliers>0?'var(--red-600)':'var(--green-600)'};">${fmt(balanceToSuppliers)}</div><div class="l">Balance Outstanding</div></div>
  </div>
  <div class="toolbar"><button class="btn btn-primary" data-action="toggle-payment-form">+ Record Supplier Payment</button></div>
  ${state.showPaymentForm ? `
  <div class="card" style="margin-bottom:16px;"><div class="card-body">
    <div class="form-grid">
      <div class="field"><label>Date</label><input id="sp-date" type="text" value="07 Jul 2026"></div>
      <div class="field"><label>Supplier</label>
        <select id="sp-supplier">${suppliers.map(s=>`<option>${s}</option>`).join('') || '<option>-</option>'}</select>
      </div>
      <div class="field"><label>Reference</label><input id="sp-ref" value="SUP-${5600+sp.length}"></div>
      <div class="field"><label>Method</label>
        <select id="sp-method"><option>Bank Transfer</option><option>Card</option><option>Cheque</option></select>
      </div>
      <div class="field" style="grid-column:1/-1;"><label>Amount (\u00a3)</label><input id="sp-amount" type="number" placeholder="e.g. 640"></div>
    </div>
    <div class="toolbar" style="margin-top:14px;">
      <button class="btn btn-primary" data-action="save-supplier-payment">Save Payment</button>
      <button class="btn btn-ghost" data-action="toggle-payment-form">Cancel</button>
    </div>
  </div></div>` : ''}
  ${sp.length ? `<table>
    <thead><tr><th>Date</th><th>Supplier</th><th>Reference</th><th>Method</th><th>Amount</th></tr></thead>
    <tbody>${sp.map(p=>`<tr><td>${p.date}</td><td>${p.supplier}</td><td class="ref-link">${p.ref}</td><td>${p.method}</td><td>${fmt(p.amount)}</td></tr>`).join('')}</tbody>
    <tfoot><tr style="font-weight:700;background:var(--panel-alt);"><td colspan="4">Total Paid to Suppliers</td><td>${fmt(paidToSupplier)}</td></tr></tfoot>
  </table>` : `<div class="empty-state"><div class="icon">\u{1F4B8}</div>No supplier payments recorded yet.</div>`}`;
}

/* ================= EVENTS ================= */
function attachGlobalEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.topTab = el.getAttribute('data-nav');
      state.openBookingId = null;
      state.subTab = "main";
      render();
    });
  });
  document.querySelectorAll('[data-subtab]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.subTab = el.getAttribute('data-subtab'); render(); });
  });
  const closeBtn = document.querySelector('[data-action="close-portfolio"]');
  if(closeBtn) closeBtn.addEventListener('click', ()=>{ state.openBookingId=null; render(); });
  const showEnq = document.querySelector('[data-action="show-enquiries-panel"]');
  if(showEnq) showEnq.addEventListener('click', ()=>{ state.topTab='enquiries'; render(); });
  const logoutBtn = document.querySelector('[data-action="do-logout"]');
  if(logoutBtn) logoutBtn.addEventListener('click', ()=>{
    state.loggedIn = false;
    state.role = null;
    state.currentUser = null;
    state.topTab = "home";
    state.openBookingId = null;
    render();
  });
}

function attachListEvents(){
  document.querySelectorAll('[data-searchtab]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.searchTab = el.getAttribute('data-searchtab'); render(); });
  });
  const saveBtn = document.querySelector('[data-action="save-manual-booking"]');
  if(saveBtn) saveBtn.addEventListener('click', ()=>{
    const client = document.getElementById('mb-client').value.trim();
    const dest = document.getElementById('mb-dest').value.trim();
    if(!client || !dest){
      toast("Please enter at least a client name and destination");
      return;
    }
    const depart = document.getElementById('mb-depart').value;
    const ret = document.getElementById('mb-return').value;
    const country = document.getElementById('mb-country').value.trim();
    const numPax = Math.max(parseInt(document.getElementById('mb-passengers').value) || 1, 1);
    const agent = document.getElementById('mb-agent').value;
    const status = document.getElementById('mb-status').value;
    const hmRef = document.getElementById('mb-hmref').value.trim();
    const bookingRef = document.getElementById('mb-bookingref').value.trim();
    const supplier = document.getElementById('mb-supplier').value.trim();
    const hotel = document.getElementById('mb-hotel').value.trim();
    const nights = document.getElementById('mb-nights').value.trim();
    const dueDateRaw = document.getElementById('mb-duedate').value;
    const value = parseFloat(document.getElementById('mb-value').value) || 0;
    const cost = parseFloat(document.getElementById('mb-cost').value) || value;
    const email = document.getElementById('mb-email').value.trim();
    const phone = document.getElementById('mb-phone').value.trim();
    const important = document.getElementById('mb-important').value.trim();
    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : 'TBC';
    const fmtDateSlash = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}) : '-';
    const statusLabels = {confirmed:"Confirmed", pending:"Pending", quote:"Quote", cancelled:"Cancelled", changed:"Changed"};

    const newId = "BK-" + (20465 + bookings.filter(b=>b.id.startsWith('BK-2046')).length + Math.floor(Math.random()*100));
    const passengers = [{name:client, type:"Adult", dob:'-', passport:'-'}];
    for(let i=1;i<numPax;i++) passengers.push({name:`Passenger ${i+1}`, type:"Adult", dob:'-', passport:'-'});

    const costings = (supplier||hotel) ? [{
      item: hotel ? `${hotel}${nights?` (${nights} nights)`:''}` : `Booking for ${dest}`,
      supplier: supplier||'-', cost, sell:value
    }] : [];

    const nowStr = "07/07/2026 " + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

    bookings.unshift({
      id:newId, client, destination:dest, depart:fmtDate(depart), ret:fmtDate(ret),
      status, agent, value,
      contact:{ name:client, email:email||'-', phone:phone||'-', address:'-', pref: email?'Email':'Phone' },
      passengers, costings, receipts:[], supplierPayments:[], documentation:[],
      notes:[{author:agent, date:"07 Jul 2026", text:"Booking added manually."}],
      payments:{ total:value, paid:0, due:value, dueDate: dueDateRaw?fmtDate(dueDateRaw):'-' },
      overview:{
        portfolioRef:newId, createdOn:nowStr, bookedOn:nowStr,
        hmRef:hmRef||'-', bookingWebsite:'-', externalRef:'-', importantInfo:important,
        bookingStatusLabel:statusLabels[status]||status,
        dueDate: dueDateRaw?fmtDateSlash(dueDateRaw):'-', balanceDue:value, salesConsultant:agent,
        financials:{
          holidayPrice:value, supplements:0.00, handlingFees:0.00, totalCost:cost,
          totalPaid:0.00, outstanding:value, unassignedCredits:0.00, assignedCredits:0.00, hwCommissionDue:0.00,
          totalDue:cost, dueToSuppliers:cost, paidToSupplier:0.00, vat:0.00,
          currencyLossGain:0.00, refund:0.00, profit:value-cost, hwCommissionPaid:0.00
        },
        passengerDetails:passengers.map((p,i)=>({
          name:p.name, dob:p.dob, age:'', type:p.type, lead:i===0,
          telephone:i===0?(phone||''):'', mobile:phone||'', email:i===0?(email||''):''
        })),
        elements: costings.length ? [{
          etype:"Package", status, supplier:supplier||'-', bookingRef:bookingRef||'-',
          pax:numPax, nett:cost, gross:value,
          operatorRef:bookingRef||'-', from: depart?fmtDateSlash(depart):'-', hotelName:hotel||dest,
          nights:nights||'-', description:'', transfersIncluded:false, grossPrice:value,
          flights:[], rooms:[], passengers:passengers.map(p=>p.name), documentsReceived:false
        }] : []
      }
    });
    toast("Booking " + newId + " saved");
    state.topTab = "bookings";
    state.searchTab = "search";
    render();
  });
  const clearBtn = document.querySelector('[data-action="clear-manual-booking"]');
  if(clearBtn) clearBtn.addEventListener('click', ()=>render());

  document.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.openBookingId = el.getAttribute('data-open');
      state.pfTab = 'overview';
      state.subTab = 'main';
      render();
    });
  });
  const search = document.getElementById('bk-search');
  const filter = document.getElementById('bk-filter');
  function applyFilter(){
    const q = (search?.value||'').toLowerCase();
    const f = filter?.value || 'all';
    const filtered = bookings.filter(b=>{
      const matchQ = !q || b.client.toLowerCase().includes(q) || b.id.toLowerCase().includes(q) || b.destination.toLowerCase().includes(q);
      const matchF = f==='all' || b.status===f;
      return matchQ && matchF;
    });
    document.getElementById('bk-tbody').innerHTML = filtered.map(rowHtml).join('') || `<tr><td colspan="7" style="text-align:center;color:var(--text-400);padding:24px;">No bookings match your search.</td></tr>`;
    document.querySelectorAll('[data-open]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.openBookingId = el.getAttribute('data-open');
        state.pfTab = 'overview';
        render();
      });
    });
  }
  if(search) search.addEventListener('input', applyFilter);
  if(filter) filter.addEventListener('change', applyFilter);

  const actionToasts = {
    "run-search":"Searching connected suppliers... (demo)",
    "reset-search":"Search form cleared",
    "new-enquiry":"New enquiry form would open here",
    "new-booking":"New booking wizard would open here"
  };
  document.querySelectorAll('[data-action]').forEach(el=>{
    const act = el.getAttribute('data-action');
    if(actionToasts[act]){
      el.addEventListener('click', ()=>toast(actionToasts[act]));
    }
  });
}

function attachPortfolioEvents(){
  document.querySelectorAll('[data-pftab]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.pfTab = el.getAttribute('data-pftab');
      state.showReceiptForm = false;
      state.showPaymentForm = false;
      render();
    });
  });
  const backBtn = document.querySelector('[data-nav-close]');
  if(backBtn) backBtn.addEventListener('click', ()=>{ state.openBookingId=null; render(); });

  const moreToggle = document.querySelector('[data-action="toggle-more"]');
  if(moreToggle) moreToggle.addEventListener('click', (e)=>{
    e.stopPropagation();
    state.moreOpen = !state.moreOpen;
    render();
  });
  document.addEventListener('click', ()=>{ if(state.moreOpen){ state.moreOpen=false; render(); } }, {once:true});

  const actionToasts = {
    "add-passenger":"Add passenger form would open here",
    "lookup-address":"Address lookup would run here",
    "add-costing":"Add costing line form would open here",
    "upload-doc":"Document upload dialog would open here",
    "add-note":"Note added",
    "take-payment":"Take payment form would open here",
    "send-reminder":"Payment reminder sent to client",
    "menu-print":"Preparing confirmation for print...",
    "menu-email":"Opening email composer...",
    "menu-duplicate":"Portfolio duplicated",
    "menu-cancel":"Cancellation flow would start here",
    "book-new-element":"Book new element wizard would open here",
    "customer-view":"Opening customer-facing view...",
    "print-booking-ov":"Preparing booking for print...",
    "edit-passenger":"Edit passenger form would open here",
    "clone-element":"Element cloned",
    "edit-element":"Edit element form would open here",
    "save-portfolio-details":"Portfolio details saved"
  };
  document.querySelectorAll('[data-action="toggle-element-detail"]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const idx = el.getAttribute('data-idx');
      const isOpen = state.ovOpenElements[idx]===false ? false : true;
      state.ovOpenElements[idx] = !isOpen;
      render();
    });
  });

  document.querySelectorAll('[data-action="toggle-receipt-form"]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.showReceiptForm = !state.showReceiptForm; render(); });
  });

  const saveRc = document.querySelector('[data-action="save-receipt"]');
  if(saveRc) saveRc.addEventListener('click', ()=>{
    const b = bookings.find(x=>x.id===state.openBookingId);
    const amount = parseFloat(document.getElementById('rc-amount').value) || 0;
    if(!b || amount<=0){ toast("Enter an amount to record a receipt"); return; }
    const date = document.getElementById('rc-date').value.trim() || "07 Jul 2026";
    const ref = document.getElementById('rc-ref').value.trim() || ("RCP-" + (9200 + b.receipts.length));
    const method = document.getElementById('rc-method').value;
    const note = document.getElementById('rc-note').value.trim() || "Payment received";
    b.receipts.push({date, ref, amount, method, note});
    b.payments.paid = (b.payments.paid||0) + amount;
    b.payments.due = Math.max((b.payments.total||0) - b.payments.paid, 0);
    if(b.overview){
      b.overview.financials.totalPaid = b.payments.paid;
      b.overview.financials.outstanding = b.payments.due;
      b.overview.balanceDue = b.payments.due;
    }
    state.showReceiptForm = false;
    render();
    toast("Receipt " + ref + " recorded");
  });

  document.querySelectorAll('[data-action="toggle-payment-form"]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.showPaymentForm = !state.showPaymentForm; render(); });
  });

  const saveSp = document.querySelector('[data-action="save-supplier-payment"]');
  if(saveSp) saveSp.addEventListener('click', ()=>{
    const b = bookings.find(x=>x.id===state.openBookingId);
    const amount = parseFloat(document.getElementById('sp-amount').value) || 0;
    if(!b || amount<=0){ toast("Enter an amount to record a supplier payment"); return; }
    const date = document.getElementById('sp-date').value.trim() || "07 Jul 2026";
    const supplier = document.getElementById('sp-supplier').value;
    const ref = document.getElementById('sp-ref').value.trim() || ("SUP-" + (5600 + (b.supplierPayments||[]).length));
    const method = document.getElementById('sp-method').value;
    if(!b.supplierPayments) b.supplierPayments = [];
    b.supplierPayments.push({date, supplier, ref, method, amount});
    if(b.overview){
      const totalCost = b.costings.reduce((s,c)=>s+c.cost,0);
      const paid = b.supplierPayments.reduce((s,p)=>s+p.amount,0);
      b.overview.financials.paidToSupplier = paid;
      b.overview.financials.dueToSuppliers = Math.max(totalCost - paid, 0);
    }
    state.showPaymentForm = false;
    render();
    toast("Supplier payment " + ref + " recorded");
  });

  const saveContact = document.querySelector('[data-action="save-contact"]');
  if(saveContact) saveContact.addEventListener('click', ()=>{
    const b = bookings.find(x=>x.id===state.openBookingId);
    if(!b) return;
    const first = document.getElementById('ct-first').value.trim();
    const last = document.getElementById('ct-last').value.trim();
    if(!first || !last){ toast("First name and last name are required"); return; }
    const detail = {
      title: document.getElementById('ct-title').value,
      firstName: first,
      middleName: document.getElementById('ct-middle').value.trim(),
      lastName: last,
      dobDay: document.getElementById('ct-dob-day').value.trim(),
      dobMonth: document.getElementById('ct-dob-month').value,
      dobYear: document.getElementById('ct-dob-year').value.trim(),
      telephone: document.getElementById('ct-telephone').value.trim(),
      mobile: document.getElementById('ct-mobile').value.trim(),
      workPhone: document.getElementById('ct-workphone').value.trim(),
      altPhone: document.getElementById('ct-altphone').value.trim(),
      fax: document.getElementById('ct-fax').value.trim(),
      email: document.getElementById('ct-email').value.trim(),
      altEmail: document.getElementById('ct-altemail').value.trim(),
      postcode: document.getElementById('ct-postcode').value.trim(),
      addressLine1: document.getElementById('ct-addr1').value.trim(),
      addressLine2: document.getElementById('ct-addr2').value.trim(),
      town: document.getElementById('ct-town').value.trim(),
      county: document.getElementById('ct-county').value.trim(),
      country: document.getElementById('ct-country').value.trim() || 'United Kingdom'
    };
    const fullName = [detail.title, detail.firstName, detail.middleName, detail.lastName].filter(Boolean).join(' ');
    const addressStr = [detail.addressLine1, detail.addressLine2, detail.town, detail.county, detail.postcode].filter(Boolean).join(', ');
    b.contact.detail = detail;
    b.contact.name = fullName;
    b.contact.email = detail.email || '-';
    b.contact.phone = detail.telephone || detail.mobile || '-';
    b.contact.address = addressStr || '-';

    const createPassenger = document.getElementById('ct-create-passenger').checked;
    if(createPassenger){
      const dob = (detail.dobDay && detail.dobMonth && detail.dobYear)
        ? `${detail.dobDay} ${detail.dobMonth.slice(0,3)} ${detail.dobYear}` : '-';
      b.passengers.push({name: fullName, type:"Adult", dob, passport:'-'});
      toast("Contact saved and added as a new passenger");
    } else {
      toast("Contact details saved");
    }
    render();
  });

  document.querySelectorAll('[data-action]').forEach(el=>{
    const act = el.getAttribute('data-action');
    if(act === 'add-note'){
      el.addEventListener('click', ()=>{
        const ta = document.getElementById('new-note');
        const b = bookings.find(x=>x.id===state.openBookingId);
        if(ta && ta.value.trim() && b){
          b.notes.push({author:"S. Kaur", date:"07 Jul 2026 " + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}), text: ta.value.trim()});
          render();
          toast("Note added");
        }
      });
    } else if(actionToasts[act]){
      el.addEventListener('click', (e)=>{ e.stopPropagation(); toast(actionToasts[act]); });
    }
  });
}

render();
</script>
</body>
</html>
